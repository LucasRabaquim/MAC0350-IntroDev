<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotobolso - bookannotation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="../../static/global.css" />
  <link rel="stylesheet" href="../../static/post.css" />
</head>

<body>

  <div class="card post flex-col" id="annotation-{{ annotation.id }}">
    <div class="flex flex-row justify-around align-center relative">
      <span>{{ annotation.date }} </span>
      <span>{{ user.name }}@<span class="secondary-text">{{ user.username }}</span></span>
      
      
      
        <span><input type="checkbox" name="visibility" id="visibility-setting" disabled {% if annotation.public %}checked{% endif %} />
        <label for="visibility-setting"></label></span>
    
      
        <button class="three-dots" hx-get="/annotation_options_component?id={{ annotation.id }}" ><i class="fas fa-ellipsis-v"></i></button>


    </div>
    <div class="post-text flex flex-col justify-center">
      {{ annotation.text }}
    </div>
  </div>


</body>

</html>
