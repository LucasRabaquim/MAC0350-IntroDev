<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotobolso - Signin</title>
  <link rel="stylesheet" href="../static/global.css" />
  <link rel="stylesheet" href="../static/sign.css" />
</head>
<body>
    <main class="flex flex-col justify-center align-center flex-grow">
  <div class="card sign-card flex flex-col ">
    <h1>Entrar</h1>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required />
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="********" required minlength="8" />
      <button onclick="submit()">Entrar</button>
    <p id="sign-card-link">Ainda não tem conta? <a href="/signup">Cadastre-se</a></p>
  </div>
  </main>
</body>
<script>
  async function submit() {
    const user = {
        name: "",
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
    };

    const response = await fetch('/signin', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(user)
    });
    if (response.ok) {
      const result = await response.json();
      window.location.href = "/profile";
    }
    else {
      const result = await response.json();
      alert(result.detail);
    }
}
</script>
</html>
